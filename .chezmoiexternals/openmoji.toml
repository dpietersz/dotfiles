# OpenMoji — distinctive thin-outline / line-art color emoji, preferred over
# Noto in Chromium/Electron apps (Helium, teams-for-linux). See dot_config/
# fontconfig/conf.d/75-emoji-color.conf for the fallback wiring.
#
# MUST be the COLR build (family "OpenMoji Color"). The release zip ships many
# builds; we extract ONLY OpenMoji-color-glyf_colr_0.ttf (pure COLRv0+CPAL).
# Do NOT use the picosvgz / untouchedsvgz / *_svg builds — those are SVGinOT,
# which Chromium/Skia renders as black outlines (verified). cbdt/sbix would also
# work format-wise, but the COLRv0 glyf build is the cleanest vector for Skia.
#
# v17.0.0 (2026-04-23) tracks Unicode 17.0 — current as of install. Bump the
# version in the URL when a newer OpenMoji release lands (quarterly-ish);
# refreshPeriod re-fetches the pinned tag so a digest change re-extracts.
# License: CC BY-SA 4.0 (attribution + share-alike).
[".fonts/OpenMoji"]
type = "archive"
url = "https://github.com/hfg-gmuend/openmoji/releases/download/17.0.0/openmoji-font.zip"
include = ["**/OpenMoji-color-glyf_colr_0.ttf"]
stripComponents = 1
refreshPeriod = "720h"
