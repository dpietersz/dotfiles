<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  75-emoji-color.conf — force Noto Color Emoji (the CBDT/bitmap build) as the
  emoji font.

  Noto Color Emoji is the modern, fully-current Google set (Unicode 17.0). The
  image's system font is the COLRv1 build (Noto-COLRv1.ttf), but teams-for-linux
  (Electron) renders COLRv1 emoji as BLANK — its bundled FreeType/Chromium can't
  draw the COLRv1 color layers, even though desktop Chromium can. So we fetch the
  CBDT/CBLC (bitmap) Noto build user-scope via .chezmoiexternals/
  noto-color-emoji.toml (the format Chrome used for a decade — renders in every
  Chromium/Electron incl. Teams) and REJECT the system COLRv1 file below so this
  build wins. Both share the family name "Noto Color Emoji" and look identical at
  UI sizes; the only cost is bitmap vs vector glyphs in modern apps.

  WHY THIS EXISTS (read before deleting):
  The image bakes the font + runs fc-cache at build time, but that bake is
  fragile: ostree/rechunk normalizes font-dir mtimes AFTER the cache is built,
  so at runtime the baked cache looks stale and fontconfig falls back to
  whatever is in ~/.cache/fontconfig. If that user cache is stale, Chromium/
  Electron apps (Helium, teams-for-linux) resolve emoji to tofu and CACHE that
  decision in-process until restarted — emoji silently break after a nightly
  image update, then "come back" only after a manual fc-cache + app restart.

  This file removes the dependence on the generic `emoji` alias ordering by
  explicitly pinning "Noto Color Emoji" and appending it to the sans/serif/mono
  fallback chains. Pure config, read by the SYSTEM libfontconfig via
  ~/.config/fontconfig/conf.d — version-independent (survives the cache-9 vs
  cache-11 split between system fontconfig 2.17 and the Homebrew fontconfig 2.18
  on PATH). The matching cache refresh lives in
  run_onchange_after_19-fc-cache.sh.tmpl (on apply) and the
  refresh-fontconfig-cache.service user unit (on login).

  CHROMIUM CONSTRAINT: any emoji font swapped in here MUST be COLR / CBDT / sbix.
  Chromium/Skia does NOT render SVG-in-OpenType (SVGinOT) color glyphs — they
  show as black outlines. This eliminated Twemoji (only a SVGinOT font exists),
  Microsoft Fluent (SVGinOT community builds), and JoyPixels (proprietary). The
  only other viable modern set is OpenMoji's COLRv0 build (distinctive outline
  style) — see git history for the OpenMoji external if you want to switch back.
-->
<fontconfig>
  <!-- Reject the system COLRv1 Noto so the CBDT/bitmap build (in ~/.fonts) is
       the only "Noto Color Emoji" fontconfig can select. Without this, the two
       same-named fonts are ambiguous and Electron apps may pick the COLRv1 one
       and render blank. Globs only the system color-emoji dir (one file). -->
  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/google-noto-color-emoji-fonts/*</glob>
    </rejectfont>
  </selectfont>

  <!-- Pin the `emoji` generic to the color font. -->
  <alias binding="strong">
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

  <!-- Append the color emoji font as a last-resort fallback for normal text
       families so per-codepoint emoji fallback always reaches it. -->
  <alias binding="weak">
    <family>sans-serif</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias binding="weak">
    <family>serif</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
  <alias binding="weak">
    <family>monospace</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>
</fontconfig>
