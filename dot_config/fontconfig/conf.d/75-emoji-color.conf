<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!--
  75-emoji-color.conf — force OpenMoji (COLR) as the emoji font, with Noto
  Color Emoji as the secondary fallback.

  OpenMoji is the distinctive thin-outline / line-art set; it MUST be the COLR
  build (family "OpenMoji Color"), fetched by .chezmoiexternals/openmoji.toml —
  Chromium can't render the SVGinOT OpenMoji builds (black outlines). OpenMoji
  17.0.0 tracks Unicode 17.0, so coverage is current; Noto stays behind it as a
  belt-and-braces fallback for any glyph OpenMoji lacks.

  To switch sets later (e.g. to Noto Color Emoji COLRv1): change the <prefer>
  family below and swap the external — that's the whole change.

  WHY THIS EXISTS (read before deleting):
  The Bluefin image bakes google-noto-color-emoji-fonts (Noto-COLRv1.ttf,
  family "Noto Color Emoji") and runs fc-cache at build time. That bake is
  fragile: ostree/rechunk normalizes font-dir mtimes AFTER the cache is built,
  so at runtime the baked cache's stored mtime mismatches the dir mtime,
  fontconfig deems it stale, and falls back to whatever is in
  ~/.cache/fontconfig. If that user cache is stale, Chromium/Electron apps
  (Helium, teams-for-linux) resolve emoji codepoints to tofu and CACHE that
  decision in-process until restarted. The result: emoji silently break after
  a nightly image update or a chezmoi font shuffle, then "come back" only after
  a manual fc-cache + app restart.

  This file removes the dependence on the generic `emoji` alias ordering by
  explicitly appending "Noto Color Emoji" to the sans-serif / serif / monospace
  fallback chains and pinning the `emoji` generic to it. Pure config, read by
  the SYSTEM libfontconfig via ~/.config/fontconfig/conf.d — version-independent
  (survives the cache-9 vs cache-11 split between system fontconfig 2.17 and the
  Homebrew fontconfig 2.18 on PATH). The matching cache refresh lives in
  run_onchange_after_19-fc-cache.sh.tmpl (on apply) and the
  refresh-fontconfig-cache.service user unit (on login).
-->
<fontconfig>
  <!-- Pin the `emoji` generic: OpenMoji first, Noto as fallback for any glyph
       OpenMoji lacks. -->
  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>OpenMoji Color</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Append the color emoji fonts as a last-resort fallback for normal text
       families so per-codepoint emoji fallback always reaches them. -->
  <alias binding="weak">
    <family>sans-serif</family>
    <prefer>
      <family>OpenMoji Color</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias binding="weak">
    <family>serif</family>
    <prefer>
      <family>OpenMoji Color</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias binding="weak">
    <family>monospace</family>
    <prefer>
      <family>OpenMoji Color</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
</fontconfig>
