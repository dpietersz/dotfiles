# Kitty Terminal Configuration
# Reference: https://sw.kovidgoyal.net/kitty/conf/

# Theme — managed by theme-switch (see ~/.config/themes/). The included file
# is rewritten on every theme change; reload is triggered via SIGUSR1.
include current-theme.conf

# ============================================================================
# Fonts
# ============================================================================

font_family      Monaspace Argon NF
bold_font        Monaspace Argon NF Bold
italic_font      Monaspace Argon NF Italic
bold_italic_font Monaspace Argon NF Bold Italic

font_size 12.0

# Monaspace ligatures require explicit stylistic sets configuration
# ss01: Common JS ligatures (!=, ===)
# ss02: Comparison operators (<=, >=)
# ss03: Arrow functions (->, ~>)
# ss04: Angle brackets (<>, </>)
font_features MonaspaceArgonNF-Regular +ss01 +ss02 +ss03 +ss04 +liga
font_features MonaspaceArgonNF-Bold +ss01 +ss02 +ss03 +ss04 +liga
font_features MonaspaceArgonNF-Italic +ss01 +ss02 +ss03 +ss04 +liga
font_features MonaspaceArgonNF-BoldItalic +ss01 +ss02 +ss03 +ss04 +liga
# ============================================================================
# Cursor
# ============================================================================

cursor_shape block
cursor_blink_interval 0

# ============================================================================
# Scrollback
# ============================================================================

scrollback_lines 10000
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ============================================================================
# Mouse
# ============================================================================

mouse_hide_wait 3.0
url_style curly

# ============================================================================
# Performance
# ============================================================================

repaint_delay 10
input_delay 3

# ============================================================================
# Bell
# ============================================================================

enable_audio_bell no
visual_bell_duration 0.0

# ============================================================================
# Window Layout
# ============================================================================

remember_window_size yes
initial_window_width 120c
initial_window_height 40c

# Hide window decorations (title bar with close button)
hide_window_decorations title-only

# ============================================================================
# Tab Bar
# ============================================================================

tab_bar_edge bottom
tab_bar_style hidden
tab_powerline_style slanted
tab_title_template "{title}"

# ============================================================================
# Advanced
# ============================================================================

# Enable kitty protocol for better mouse support
kitty_mod ctrl+shift

# Remote control — required by the kitty-session workflow (kitty-session script
# drives goto_session/close_session over this socket). Same on macOS + Linux.
allow_remote_control yes
listen_on unix:/tmp/kitty

# ============================================================================
# Keybindings
# ============================================================================

# Paste from clipboard. ctrl+shift+v is kitty's default; ctrl+v is added so
# VibeTyper's Wayland paste (which injects uinput Ctrl+V) actually triggers
# a paste into kitty -> zellij -> claude code. Trade-off: clobbers ctrl+v as
# "literal next" in readline and ctrl+v visual-block in vim/nvim *inside kitty*.
map ctrl+v paste_from_clipboard
map kitty_mod+v paste_from_clipboard

# New window
map kitty_mod+n new_window

# New tab
map kitty_mod+t new_tab

# Close window
map kitty_mod+w close_window

# Close tab
map kitty_mod+q close_tab

# Next tab
map kitty_mod+right next_tab

# Previous tab
map kitty_mod+left previous_tab

# Move tab forward
map kitty_mod+shift+right move_tab_forward

# Move tab backward
map kitty_mod+shift+left move_tab_backward

# Increase font size
map kitty_mod+equal change_font_size all +2.0

# Decrease font size
map kitty_mod+minus change_font_size all -2.0

# Reset font size
map kitty_mod+backspace change_font_size all 0

# Copy to clipboard
map kitty_mod+c copy_to_clipboard

# Paste from clipboard
map kitty_mod+v paste_from_clipboard

# ============================================================================
# Scrollback in nvim (kitty-scrollback.nvim) + keyboard copy (hints)
# ============================================================================
# Open scrollback in nvim: real vim motions, visual-select, `y` copies, and you
# can paste a selection back to the command line. The kitten lives inside the
# lazy.nvim plugin dir (same path on Linux + macOS). If it's ever "not found",
# open nvim once so Lazy installs the plugin, or run :KittyScrollbackGenerateKittens.
action_alias kitty_scrollback_nvim kitten ${HOME}/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py

# Ctrl+Shift+H — full scrollback buffer in nvim (replaces the old `less` pager)
map kitty_mod+h kitty_scrollback_nvim
# Ctrl+Shift+G — just the LAST command's output in nvim (≈ zellij ctrl+s e)
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output

# Ctrl+Shift+Y — label every line on screen; press a label to copy that line.
# (Native hints kitten — no editor. kitty also ships Ctrl+Shift+E for URLs and
#  the Ctrl+Shift+P chords for paths/words/hashes.)
map kitty_mod+y kitten hints --type line --program @

# ============================================================================
# Sessions (super+b prefix) — native kitty sessions, replaces tmux/zellij
# ============================================================================
# `super` is Super on Linux / Cmd on macOS, so these are identical on both.
# Each fixed jump and the project picker route through ~/.local/bin/kitty-session,
# which focuses the session whose PWD matches, else creates it — so the same
# directory is always ONE session, whether reached by a fixed key or a picker.
# Global pickers/alternate/list live at the niri level (Mod+Return, Mod+Tab,
# Mod+Shift+Return). See niri config.kdl.
map super+b>n launch --type=background kitty-session notes
map super+b>h launch --type=background kitty-session home
map super+b>d launch --type=background kitty-session dotfiles
map super+b>p launch --type=background kitty-session --projects
map super+b>v launch --type=background kitty-session nvim
map super+b>b launch --type=background kitty-session bash
map super+b>t launch --type=background kitty-session boxkit
map super+b>u launch --type=background kitty-session bluefin
# Pickers + alternate, in-kitty (right-hand keys). These mirror the niri globals
# (Mod+Return / Mod+Shift+Return / Mod+Tab) so the workflow is identical on
# macOS, where those niri binds don't exist. Scratchpad stays WM-only.
map super+b>enter launch --type=background kitty-session --pick
map super+b>o launch --type=background kitty-session --list
map super+b>l launch --type=background kitty-session --alt
# Kitty's own built-in session list (bare goto_session), alongside the custom
# fzf list on super+b>o — use whichever you prefer.
map super+b>k goto_session

# ============================================================================
# Shell Configuration
# ============================================================================

# Set bash as the default shell for Kitty
# On macOS: use Homebrew bash if available, otherwise use system bash
# On Linux: use system bash
shell /bin/bash

# ============================================================================
# OS Specific
# ============================================================================

# macOS specific settings
macos_option_as_alt yes
macos_hide_from_tasks no

