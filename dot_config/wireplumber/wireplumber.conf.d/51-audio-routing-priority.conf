# Audio output routing policy.
#
# Goal: built-in speaker is the sane default, external outputs auto-take-over
# on connect and fall back to the speaker on disconnect, and the HDMI monitor
# never silently grabs audio.
#
# Mechanism: priority-driven default selection with no sticky pins.
#   Bluetooth (2000) > USB DAC (1500) > built-in Speaker (1000) > HDMI (100)
# Higher priority wins, so connecting BT headphones or a USB DAC moves the
# default to them; disconnecting falls back down the chain to the speaker.
#
# Portable across machines: matches by node.name token, not by PCI path, so
# the same file works on every laptop regardless of card naming.
#
# Note: the 3.5mm headphone jack is NOT covered here. On SOF-DSP ThinkPads
# (e.g. P14s Gen5) UCM splits Speaker and Headphones into mutually-exclusive
# profiles, so jack insertion does not auto-switch — that stays a manual
# profile change. See executable_ensure-speaker-output for the speaker fix.

monitor.alsa.rules = [
  {
    matches = [ { node.name = "~alsa_output.*HDMI.*" } ]
    actions = { update-props = { priority.session = 100, priority.driver = 100 } }
  }
  {
    matches = [ { node.name = "~alsa_output.usb-.*" } ]
    actions = { update-props = { priority.session = 1500, priority.driver = 1500 } }
  }
]

monitor.bluez.rules = [
  {
    matches = [ { node.name = "~bluez_output.*" } ]
    actions = { update-props = { priority.session = 2000, priority.driver = 2000 } }
  }
]

# Disable "remember the last manually-chosen device" so routing is purely
# priority-driven. This is what makes switch-on-connect / fall-back-on-disconnect
# behave deterministically instead of sticking to a previously pinned default.
wireplumber.settings = {
  node.restore-default-targets = false
  node.stream.restore-target = false
}
