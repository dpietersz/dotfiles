# Generated by theme-switch — do not edit by hand.
# Written to ~/.config/yazi/theme.toml on every theme change. We do NOT use
# yazi's [flavor] block here because it would override these manual styles —
# the whole point is to drive yazi from our palette.

# === Manager (the main two-pane view) ===
[mgr]
cwd            = { fg = "@accent@", bold = true }
hovered        = { fg = "@bg@", bg = "@accent@" }
preview_hovered = { underline = true }

# Find / search
find_keyword  = { fg = "@warning@", bold = true, italic = true, underline = true }
find_position = { fg = "@warning@", bold = true, italic = true }

# Marker
marker_copied   = { fg = "@success@", bg = "@success@" }
marker_cut      = { fg = "@error@",   bg = "@error@" }
marker_marked   = { fg = "@accent@",  bg = "@accent@" }
marker_selected = { fg = "@blue@",    bg = "@blue@" }

# Count badges
count_copied   = { fg = "@fg@", bg = "@success@" }
count_cut      = { fg = "@fg@", bg = "@error@" }
count_selected = { fg = "@bg@", bg = "@blue@" }

# Border
border_symbol = " "
border_style  = { fg = "@border@" }

# Syntax highlighting fallback theme in previews
syntect_theme = ""

# === Tabs (top bar) ===
[tabs]
active   = { fg = "@bg@", bg = "@accent@", bold = true }
inactive = { fg = "@fg_dim@", bg = "@bg_alt@" }
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# === Mode (normal/select/unset indicators in status) ===
[mode]
normal_main = { fg = "@bg@", bg = "@accent@", bold = true }
normal_alt  = { fg = "@fg@", bg = "@bg_alt@" }
select_main = { fg = "@bg@", bg = "@warning@", bold = true }
select_alt  = { fg = "@fg@", bg = "@bg_alt@" }
unset_main  = { fg = "@bg@", bg = "@blue@",    bold = true }
unset_alt   = { fg = "@fg@", bg = "@bg_alt@" }

# === Status bar ===
[status]
overall   = { fg = "@accent@" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { bold = true }
progress_normal = { fg = "@accent@", bg = "@bg@" }
progress_error  = { fg = "@error@",  bg = "@bg@" }

perm_type  = { fg = "@warning@" }
perm_read  = { fg = "@success@" }
perm_write = { fg = "@blue@" }
perm_exec  = { fg = "@error@" }
perm_sep   = { fg = "@fg_dim@" }

# === Input ===
[input]
border   = { fg = "@accent@" }
title    = {}
value    = { fg = "@fg@" }
selected = { reversed = true }

# === Pick (popup picker) ===
[pick]
border   = { fg = "@accent@" }
active   = { fg = "@accent@", bold = true }
inactive = {}

# === Confirm dialog ===
[confirm]
border  = { fg = "@accent@" }
title   = { fg = "@accent@" }
content = {}
list    = {}
btn_yes = { reversed = true }
btn_no  = {}

# === Cmp (completion popup) ===
[cmp]
border          = { fg = "@accent@" }
active          = { fg = "@accent@", bg = "@bg_sel@" }
inactive        = {}
icon_file       = { fg = "@blue@" }
icon_folder     = { fg = "@accent@" }
icon_command    = { fg = "@warning@" }

# === Tasks ===
[tasks]
border    = { fg = "@accent@" }
title     = {}
hovered   = { fg = "@accent@", underline = true }

# === Which (keybind hint popup) ===
[which]
cols     = 3
mask     = { bg = "@bg@" }
cand     = { fg = "@blue@" }
rest     = { fg = "@fg_dim@" }
desc     = { fg = "@accent@" }
separator = "  "
separator_style = { fg = "@border@" }

# === Help ===
[help]
on      = { fg = "@accent@" }
exec    = { fg = "@blue@" }
desc    = { fg = "@fg_dim@" }
hovered = { bg = "@bg_sel@", bold = true }
footer  = { fg = "@bg@", bg = "@fg@" }

# === Notify (notification popups) ===
[notify]
title_info  = { fg = "@blue@" }
title_warn  = { fg = "@warning@" }
title_error = { fg = "@error@" }

# === Spot (spotlight/search results) ===
[spot]
border  = { fg = "@accent@" }
title   = { fg = "@accent@" }
tbl_col = { reversed = true }
tbl_cell = {}
