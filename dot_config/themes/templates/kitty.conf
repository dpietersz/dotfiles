# Generated by theme-switch — do not edit by hand.
# To change colors, run `theme-switch <name>` or `Mod+Ctrl+\` (cycle) /
# `Mod+Ctrl+Shift+\` (picker). Palette source lives in ~/.config/themes/palettes/.

foreground   @fg@
background   @bg@
selection_foreground @bg@
selection_background @fg@
cursor       @cursor@
cursor_text_color background

active_border_color   @border_active@
